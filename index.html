<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B2430;
    --paper: #EDEAE2;
    --paper-dim: #E2DDD0;
    --line: #C9C2AE;
    --bg: #12151B;
    --income: #2F6F4F;
    --income-bg: #E4EDE7;
    --expense: #A63D2F;
    --expense-bg: #F1E4E0;
    --muted: #7A7263;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .login-box {
    background: var(--paper);
    padding: 32px;
    border-radius: 6px;
    width: 280px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.35);
  }
  .login-box input {
    margin-bottom: 12px;
  }
  .login-box button {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 0;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    cursor: pointer;
  }
  .login-box button:disabled { opacity: 0.5; cursor: default; }
  .login-error {
    color: var(--expense);
    font-size: 12px;
    margin-top: 10px;
    min-height: 14px;
  }

  .sheet {
    max-width: 780px;
    margin: 0 auto;
    background: var(--paper);
    border-radius: 4px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    overflow: hidden;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .tally {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--line);
  }

  .eye-toggle-small {
    background: none;
    border: none;
    font-size: 12px;
    cursor: pointer;
    opacity: 0.5;
    margin-left: 6px;
    vertical-align: middle;
    padding: 0;
  }
  .eye-toggle-small:hover { opacity: 1; }

  .tally-item {
    padding: 16px 24px;
    border-right: 1px solid var(--line);
  }
  .tally-item:last-child { border-right: none; }

  .tally-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .tally-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
  }
  .tally-value.income { color: var(--income); }
  .tally-value.expense { color: var(--expense); }

  form {
    padding: 24px 32px;
    border-bottom: 1px solid var(--line);
  }

  .kind-toggle {
    display: inline-flex;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .kind-toggle button {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .kind-toggle button.active[data-kind="expense"] { background: var(--expense); color: #fff; }
  .kind-toggle button.active[data-kind="income"] { background: var(--income); color: #fff; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr auto;
    gap: 12px;
    align-items: end;
    margin-top: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
  }
  input:focus, select:focus {
    outline: 2px solid var(--ink);
    outline-offset: 1px;
  }

  .add-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-btn:disabled { opacity: 0.5; cursor: default; }

  .status-msg {
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
  }
  .status-msg.error { color: var(--expense); }
  .status-msg.ok { color: var(--income); }

  .calc-toggle {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 6px 12px;
    color: var(--ink);
    cursor: pointer;
    margin-left: 12px;
  }
  .calc-toggle:hover { background: var(--paper-dim); }

  .calc-panel {
    display: none;
    margin-top: 16px;
    padding: 14px;
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: 4px;
    max-width: 260px;
  }
  .calc-panel.open { display: block; }

  .calc-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    text-align: right;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px;
    margin-bottom: 8px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .calc-grid button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    padding: 10px 0;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  .calc-grid button:hover { background: var(--paper); }
  .calc-grid button.op { background: var(--ink); color: var(--paper); }
  .calc-grid button.op:hover { opacity: 0.85; }
  .calc-grid button.wide { grid-column: span 2; }

  .calc-use-btn {
    width: 100%;
    margin-top: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 0;
    background: var(--income);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
  }

  .controls {
    display: flex;
    gap: 16px;
    padding: 18px 32px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
    align-items: flex-end;
  }

  .controls label { margin-bottom: 4px; }
  .controls select { min-width: 150px; }

  .filtered-total {
    padding: 12px 32px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .filtered-total .label {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .filtered-total .value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
  }
  .filtered-total .value.expense { color: var(--expense); }
  .filtered-total .value.income { color: var(--income); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13.5px;
  }

  th {
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    padding: 10px 32px;
    border-bottom: 1px solid var(--line);
  }
  th.num, td.num { text-align: right; }

  td {
    padding: 10px 32px;
    border-bottom: 1px solid var(--line);
  }

  tr:hover td { background: rgba(0,0,0,0.02); }

  .badge {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: 2px;
  }
  .badge.expense { background: var(--expense-bg); color: var(--expense); }
  .badge.income { background: var(--income-bg); color: var(--income); }

  .amount.expense { color: var(--expense); }
  .amount.income { color: var(--income); }

  td.actions { text-align: right; }
  .edit-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 4px 10px;
    color: var(--muted);
    cursor: pointer;
  }
  .edit-btn:hover { border-color: var(--ink); color: var(--ink); }

  .edit-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 8px 14px;
    margin-bottom: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
  }
  .edit-banner.open { display: flex; }
  .edit-banner .cancel-edit {
    background: none;
    border: none;
    text-decoration: underline;
    color: var(--expense);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }

  .empty-row td {
    text-align: center;
    color: var(--muted);
    padding: 32px;
    font-family: 'Inter', sans-serif;
  }

  .show-more-wrap {
    padding: 16px 32px 24px;
    text-align: center;
  }
  .show-more-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 9px 22px;
    background: none;
    border: 1px solid var(--ink);
    border-radius: 3px;
    color: var(--ink);
    cursor: pointer;
  }
  .show-more-btn:hover { background: var(--ink); color: var(--paper); }

  .config-warning {
    margin: 20px 16px 0;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
    background: #F1E4E0;
    border: 1px solid var(--expense);
    color: var(--expense);
    padding: 12px 16px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .field-row { grid-template-columns: 1fr; }
    .tally { grid-template-columns: 1fr; }
    .tally-item { border-right: none; border-bottom: 1px solid var(--line); }
    header, form, .controls, th, td { padding-left: 18px; padding-right: 18px; }
    .controls { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div id="configWarning"></div>

<div class="login-screen" id="loginScreen">
  <form class="login-box" id="loginForm">
    <h1 style="font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px;">Ledger</h1>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px;">Enter password to view</div>
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="off" required>
    <button type="submit" id="loginSubmitBtn">Unlock</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>

<div class="sheet" id="mainContent" style="display:none;">
  <header>
    <div>
      <h1>Ledger</h1>
      <div class="tagline">Personal spending &amp; income</div>
    </div>
  </header>

  <div class="tally">
    <div class="tally-item">
      <div class="tally-label">Income</div>
      <div class="tally-value income" id="totalIncome">₱0.00</div>
      <button type="button" class="eye-toggle-small" data-target="income" title="Show">👁</button>
    </div>
    <div class="tally-item">
      <div class="tally-label">Expenses</div>
      <div class="tally-value expense" id="totalExpense">₱0.00</div>
      <button type="button" class="eye-toggle-small" data-target="expenses" title="Show">👁</button>
    </div>
    <div class="tally-item">
      <div class="tally-label">Net</div>
      <div class="tally-value" id="totalNet">₱0.00</div>
      <button type="button" class="eye-toggle-small" data-target="totalnet" title="Show">👁</button>
    </div>
  </div>

  <form id="entryForm">
    <div class="edit-banner" id="editBanner">
      <span>Editing an existing entry — kind can't be changed here.</span>
      <button type="button" class="cancel-edit" id="cancelEditBtn">Cancel edit</button>
    </div>
    <div class="kind-toggle" id="kindToggle">
      <button type="button" data-kind="expense" class="active">Expense</button>
      <button type="button" data-kind="income">Income</button>
    </div>
    <button type="button" class="calc-toggle" id="calcToggle">Calculator</button>

    <div class="calc-panel" id="calcPanel">
      <div class="calc-display" id="calcDisplay">0</div>
      <div class="calc-grid">
        <button type="button" data-calc="clear" class="op">C</button>
        <button type="button" data-calc="back" class="op">⌫</button>
        <button type="button" data-calc="%" class="op">%</button>
        <button type="button" data-calc="/" class="op">÷</button>

        <button type="button" data-calc="7">7</button>
        <button type="button" data-calc="8">8</button>
        <button type="button" data-calc="9">9</button>
        <button type="button" data-calc="*" class="op">×</button>

        <button type="button" data-calc="4">4</button>
        <button type="button" data-calc="5">5</button>
        <button type="button" data-calc="6">6</button>
        <button type="button" data-calc="-" class="op">−</button>

        <button type="button" data-calc="1">1</button>
        <button type="button" data-calc="2">2</button>
        <button type="button" data-calc="3">3</button>
        <button type="button" data-calc="+" class="op">+</button>

        <button type="button" data-calc="0" class="wide">0</button>
        <button type="button" data-calc=".">.</button>
        <button type="button" data-calc="=" class="op">=</button>
      </div>
      <button type="button" class="calc-use-btn" id="calcUseBtn">Use this amount</button>
    </div>

    <div class="field-row">
      <div>
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput" required>
      </div>
      <div>
        <label for="amountInput">Amount (₱)</label>
        <input type="number" id="amountInput" step="0.01" min="0" placeholder="0.00" required>
      </div>
      <div>
        <label for="categoryInput">Category</label>
        <select id="categoryInput" required></select>
      </div>
      <div>
        <button type="submit" class="add-btn" id="submitBtn">Add entry</button>
      </div>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </form>

  <div class="controls">
    <div>
      <label for="filterKind">Show</label>
      <select id="filterKind">
        <option value="all">All</option>
        <option value="expense">Expenses only</option>
        <option value="income">Income only</option>
      </select>
    </div>
    <div>
      <label for="filterCategory">Category</label>
      <select id="filterCategory">
        <option value="all">All</option>
      </select>
    </div>
    <div>
      <button type="button" class="calc-toggle" id="showAllBtn">Show All</button>
    </div>
  </div>

  <div class="filtered-total" id="filteredTotal" style="display:none;">
    <span class="label" id="filteredTotalLabel">Total for this filter</span>
    <span class="value" id="filteredTotalValue">₱0.00</span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Kind</th>
        <th>Category</th>
        <th class="num">Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="recordsBody">
      <tr class="empty-row"><td colspan="5">Loading…</td></tr>
    </tbody>
  </table>
  <div class="show-more-wrap" id="showMoreWrap" style="display:none;">
    <button type="button" class="show-more-btn" id="showMoreBtn">Show more</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBbNk47VgaCjeb0nLijbxzzLEUIOj_Syp5TZq9KYipsQQd5kKLtan537hX9DS4uhfuxA/exec';
// No password or secret is stored here anymore — it's typed at the login
// screen each session and held only in memory (see sessionPassword below).

const EXPENSE_CATEGORIES = ['Internet/Load', 'Transportation', 'Food', 'Other', 'Mama', 'Tithes'];
const INCOME_CATEGORIES = ['Church', 'School', 'Other'];

let records = [];
let currentKind = 'expense';
let visible = { income: false, expenses: false, totalnet: false }; // each starts hidden, independently, on every fresh load

document.querySelectorAll('.eye-toggle-small').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.target;
    visible[key] = !visible[key];
    btn.textContent = visible[key] ? '🙈' : '👁';
    btn.title = visible[key] ? 'Hide' : 'Show';
    render();
  });
});

const dateInput = document.getElementById('dateInput');
const amountInput = document.getElementById('amountInput');
const categoryInput = document.getElementById('categoryInput');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');
const filterKind = document.getElementById('filterKind');
const filterCategory = document.getElementById('filterCategory');
const showAllBtn = document.getElementById('showAllBtn');
const recordsBody = document.getElementById('recordsBody');
const configWarning = document.getElementById('configWarning');

function checkConfig() {
  if (SCRIPT_URL.includes('PASTE_')) {
    configWarning.innerHTML = '<div class="config-warning">This site isn\'t connected to your sheet yet.</div>';
    submitBtn.disabled = true;
    return false;
  }
  return true;
}

function money(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setKind(kind) {
  currentKind = kind;
  document.querySelectorAll('.kind-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.kind === kind);
  });
  populateCategoryOptions(categoryInput, kind === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES);
}

function populateCategoryOptions(select, list) {
  select.innerHTML = '';
  list.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    select.appendChild(opt);
  });
}

document.querySelectorAll('.kind-toggle button').forEach(btn => {
  btn.addEventListener('click', () => setKind(btn.dataset.kind));
});

function populateFilterCategories() {
  const kind = filterKind.value;
  let list = kind === 'expense' ? EXPENSE_CATEGORIES : (kind === 'income' ? INCOME_CATEGORIES : [...EXPENSE_CATEGORIES, ...INCOME_CATEGORIES]);
  filterCategory.innerHTML = '<option value="all">All</option>';
  list.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    filterCategory.appendChild(opt);
  });
}

filterKind.addEventListener('change', () => {
  populateFilterCategories();
  visibleCount = PAGE_SIZE;
  render();
});
filterCategory.addEventListener('change', () => {
  visibleCount = PAGE_SIZE;
  render();
});

document.getElementById('showMoreBtn').addEventListener('click', () => {
  visibleCount += PAGE_SIZE;
  render();
});

showAllBtn.addEventListener('click', () => {
  filterKind.value = 'all';
  populateFilterCategories();
  filterCategory.value = 'all';
  visibleCount = PAGE_SIZE;
  render();
});

let recordSeq = 0;

async function loadRecords(password) {
  const res = await fetch(SCRIPT_URL + '?password=' + encodeURIComponent(password));
  const data = await res.json();
  if (data.error) {
    throw new Error(data.error);
  }
  records = data.records || [];
  records.forEach(r => { r._seq = recordSeq++; });
  render();
}

const PAGE_SIZE = 20;
let visibleCount = PAGE_SIZE;

function render() {
  const kindFilter = filterKind.value;
  const catFilter = filterCategory.value;

  let filtered = records.filter(r => {
    if (kindFilter !== 'all' && r.kind !== kindFilter) return false;
    if (catFilter !== 'all' && r.category !== catFilter) return false;
    return true;
  });

  filtered.sort((a, b) => {
    const byDate = b.date.localeCompare(a.date);
    if (byDate !== 0) return byDate;
    const byAddedAt = (b.addedAt || 0) - (a.addedAt || 0);
    if (byAddedAt !== 0) return byAddedAt;
    return (b._seq || 0) - (a._seq || 0); // fallback only for legacy rows with no real timestamp on either side
  });

  const toShow = filtered.slice(0, visibleCount);

  if (toShow.length === 0) {
    recordsBody.innerHTML = '<tr class="empty-row"><td colspan="5">No entries match this filter.</td></tr>';
  } else {
    recordsBody.innerHTML = toShow.map(r => `
      <tr>
        <td>${r.date}</td>
        <td><span class="badge ${r.kind}">${r.kind}</span></td>
        <td>${r.category}</td>
        <td class="num amount ${r.kind}">${r.kind === 'expense' ? '−' : '+'}${money(r.amount)}</td>
        <td class="actions"><button type="button" class="edit-btn" data-row="${r.row}" data-kind="${r.kind}" data-date="${r.date}" data-amount="${r.amount}" data-category="${r.category}">Edit</button></td>
      </tr>
    `).join('');
  }

  const showMoreWrap = document.getElementById('showMoreWrap');
  const showMoreBtn = document.getElementById('showMoreBtn');
  if (filtered.length > visibleCount) {
    showMoreWrap.style.display = 'block';
    showMoreBtn.textContent = `Show more (${filtered.length - visibleCount} left)`;
  } else {
    showMoreWrap.style.display = 'none';
  }

  const totalIncome = records.filter(r => r.kind === 'income').reduce((s, r) => s + Number(r.amount), 0);
  const totalExpense = records.filter(r => r.kind === 'expense').reduce((s, r) => s + Number(r.amount), 0);
  document.getElementById('totalIncome').textContent = visible.income ? money(totalIncome) : '₱••••.••';
  document.getElementById('totalExpense').textContent = visible.expenses ? money(totalExpense) : '₱••••.••';
  document.getElementById('totalNet').textContent = visible.totalnet ? money(totalIncome - totalExpense) : '₱••••.••';

  const bar = document.getElementById('filteredTotal');
  if (kindFilter === 'all' && catFilter === 'all') {
    bar.style.display = 'none';
  } else {
    bar.style.display = 'flex';
    document.getElementById('filteredTotalValue').textContent = money(filtered.reduce((s, r) => s + Number(r.amount), 0));
  }
}

let editingRow = null; // null = add mode; a sheet row number = edit mode
const editBanner = document.getElementById('editBanner');
const kindToggle = document.getElementById('kindToggle');
const cancelEditBtn = document.getElementById('cancelEditBtn');

recordsBody.addEventListener('click', (e) => {
  const btn = e.target.closest('.edit-btn');
  if (!btn) return;
  enterEditMode({
    row: Number(btn.dataset.row),
    kind: btn.dataset.kind,
    date: btn.dataset.date,
    amount: btn.dataset.amount,
    category: btn.dataset.category
  });
});

function enterEditMode(record) {
  editingRow = record.row;
  currentKind = record.kind;

  // lock the kind toggle visually and functionally, since kind can't change on edit
  document.querySelectorAll('.kind-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.kind === record.kind);
  });
  kindToggle.style.pointerEvents = 'none';
  kindToggle.style.opacity = '0.5';

  populateCategoryOptions(categoryInput, record.kind === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES);
  dateInput.value = record.date;
  amountInput.value = record.amount;
  categoryInput.value = record.category;

  editBanner.classList.add('open');
  submitBtn.textContent = 'Save changes';
  statusMsg.textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function exitEditMode() {
  editingRow = null;
  kindToggle.style.pointerEvents = '';
  kindToggle.style.opacity = '';
  editBanner.classList.remove('open');
  submitBtn.textContent = 'Add entry';
  amountInput.value = '';
  statusMsg.textContent = '';
  setKind('expense');
  dateInput.valueAsDate = new Date();
}

cancelEditBtn.addEventListener('click', exitEditMode);

document.getElementById('entryForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!checkConfig()) return;

  submitBtn.disabled = true;
  submitBtn.textContent = editingRow ? 'Saving…' : 'Adding…';

  const payload = {
    password: sessionPassword,
    action: editingRow ? 'edit' : 'add',
    row: editingRow || undefined,
    kind: currentKind,
    date: dateInput.value,
    amount: amountInput.value,
    category: categoryInput.value
  };

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // avoids CORS preflight; Apps Script doesn't handle OPTIONS
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (editingRow) {
      const target = records.find(r => r.row === editingRow && r.kind === payload.kind);
      if (target) {
        target.date = payload.date;
        target.amount = Number(payload.amount);
        target.category = payload.category;
      }
      statusMsg.textContent = 'Saved.';
      exitEditMode();
    } else {
      statusMsg.textContent = 'Added.';
      amountInput.value = '';
      records.push({ row: data.row, kind: currentKind, date: payload.date, amount: Number(payload.amount), category: payload.category, addedAt: Date.now(), _seq: recordSeq++ });
    }
    render();
  } catch (err) {
    statusMsg.textContent = 'Failed: ' + err.message;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = editingRow ? 'Save changes' : 'Add entry';
  }
});

const calcToggle = document.getElementById('calcToggle');
const calcPanel = document.getElementById('calcPanel');
const calcDisplay = document.getElementById('calcDisplay');
calcToggle.addEventListener('click', () => calcPanel.classList.toggle('open'));

document.querySelectorAll('[data-calc]').forEach(btn => {
  btn.addEventListener('click', () => {
    let key = btn.dataset.calc;
    if (key === 'clear') calcExpr = '';
    else if (key === 'back') calcExpr = calcExpr.slice(0, -1);
    else if (key === '=') calcExpr = String(Function('"use strict"; return (' + calcExpr.replace(/%/g, '/100*') + ')')());
    else calcExpr += key;
    calcDisplay.textContent = calcExpr || '0';
  });
});

let calcExpr = '';
document.getElementById('calcUseBtn').addEventListener('click', () => {
  amountInput.value = calcExpr;
  calcPanel.classList.remove('open');
});

dateInput.valueAsDate = new Date();
setKind('expense');
populateFilterCategories();

// ---- Login gate: nothing is fetched until this succeeds ----
let sessionPassword = null; // held only in memory for this tab; never saved anywhere

const loginForm = document.getElementById('loginForm');
const loginScreen = document.getElementById('loginScreen');
const loginPassword = document.getElementById('loginPassword');
const loginSubmitBtn = document.getElementById('loginSubmitBtn');
const loginError = document.getElementById('loginError');
const mainContent = document.getElementById('mainContent');

if (!checkConfig()) {
  loginSubmitBtn.disabled = true;
  loginPassword.disabled = true;
} else {
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginSubmitBtn.disabled = true;
    loginSubmitBtn.textContent = 'Checking…';
    loginError.textContent = '';

    const typed = loginPassword.value;
    try {
      await loadRecords(typed);
      sessionPassword = typed; // now usable for add/edit calls this session
      loginScreen.style.display = 'none';
      mainContent.style.display = 'block';
    } catch (err) {
      loginError.textContent = 'Wrong password.';
      loginPassword.value = '';
      loginPassword.focus();
    } finally {
      loginSubmitBtn.disabled = false;
      loginSubmitBtn.textContent = 'Unlock';
    }
  });
}
</script>
